  .growers-grid-section {
    background: var(--cream);
    padding: 80px 0 50px;
  }
  
  .grower-card {
    background: #fff;
    border-radius: var(--radius-lg);

    border: 2px solid transparent;
    height: 100%;

    justify-content: center;
    font-size: 26px;
    margin-bottom: 20px;
    transition: var(--transition);

    background: var(--green-leaf);
    color: #fff;
  }
  
  .grower-name {

    color: var(--green-dark);

    height: 230px;
    background: #000;

    width: 100%;
    height: 100%;

  }

    background: #fff;

    align-items: center;
    justify-content: center;
    font-size: 28px;
    flex-shrink: 0;

    flex-grow: 1;
    min-width: 0;
  }
  
  .doc-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--green-dark);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;

    font-size: 0.8rem;

    font-size: 16px;

    flex-shrink: 0;

    color: #fff;
  }

    padding: 60px 0;
    color: var(--text-muted);
  }

    color: var(--green-pale);
    margin-bottom: 15px;
  }

    border: none;

    border-radius: 8px;

    position: absolute;
    top: -45px;
    right: 0;
    background: none;
    border: none;
    color: #fff;
    font-size: 30px;

    let mediaList = [];
    let selectedGrowerId = 'all'; // 'all' displays general / all media, otherwise filters by growerId
    let activeMediaType = 'image'; // 'image', 'video', 'pdf'
    
    // Load database
    loadGrowersData();
    
    function loadGrowersData() {
      // Fetch growers
      $.ajax({
        url: '/data/growers.json',
        type: 'GET',
        cache: false,
        dataType: 'json',
        success: function(growers) {
          growersList = growers || [];
          
          // Fetch media
          $.ajax({
            url: '/data/media.json',
            type: 'GET',
            cache: false,
            dataType: 'json',
            success: function(media) {
              mediaList = media || [];
              renderGrowersList();
              renderMediaShowcase();
            },
            error: function() {
              mediaList = [];
              renderGrowersList();
              renderMediaShowcase();
            }
          });
        },
        error: function() {
          $('#growersGrid').html(`
            <div class="col-12 text-center py-5 text-muted">
              <i class="fas fa-exclamation-triangle fa-2x text-warning mb-2"></i>
              <p class="small">Could not load grower data at this moment. Please try again later.</p>
            </div>
          `);
        }
      });
    }
    
    function renderGrowersList() {
      const container = $('#growersGrid');
      container.empty();
      
      // Add "All Growers / General Gallery" Card
      const generalCard = $(`
        <div class="col-lg-3 col-md-6 animate-on-scroll">
          <div class="grower-card active" data-id="all">
            <div class="grower-badge-active">Selected</div>
            <div class="grower-avatar"><i class="fas fa-globe"></i></div>
            <h3 class="grower-name">General / All</h3>
            <div class="grower-meta-item"><i class="fas fa-map-marker-alt"></i> <span>Global Farm Network</span></div>
            <div class="grower-meta-item"><i class="fas fa-seedling"></i> <span>500+ Acres Combined</span></div>
            <p class="grower-details">Browse unified updates, documents, and media uploads from all contract farming plots across Nellore and southern regions.</p>
          </div>
        </div>
      `);
      container.append(generalCard);
      
      if (growersList.length > 0) {
        growersList.forEach(g => {
          // Count linked files for this grower
          const imgCount = mediaList.filter(item => item.growerId === g.id && item.type === 'image').length;
          const vidCount = mediaList.filter(item => item.growerId === g.id && item.type === 'video').length;
          const docCount = mediaList.filter(item => item.growerId === g.id && item.type === 'pdf').length;
          
          const phoneHtml = g.phone ? `<div class="grower-meta-item"><i class="fas fa-phone-alt"></i> <span>${g.phone}</span></div>` : '';
          const cropHtml = g.crop ? `<div class="grower-meta-item"><i class="fas fa-leaf"></i> <span>Crop: ${g.crop}</span></div>` : '';
          
          const growerCard = $(`
            <div class="col-lg-3 col-md-6 animate-on-scroll">
              <div class="grower-card" data-id="${g.id}">
                <div class="grower-badge-active">Selected</div>
                <div class="grower-avatar"><i class="fas fa-user"></i></div>
                <h3 class="grower-name">${g.name}</h3>
                <div class="grower-meta-item"><i class="fas fa-map-marker-alt"></i> <span>${g.location}</span></div>
                <div class="grower-meta-item"><i class="fas fa-seedling"></i> <span>${g.acres || 'Multiple'} Acres</span></div>
                ${phoneHtml}
                ${cropHtml}
                <div class="grower-meta-item" style="font-size:0.8rem; margin-top:5px; color:var(--green-leaf);">
                  <i class="fas fa-file-invoice"></i> 
                  <span>${imgCount} Photos &bull; ${vidCount} Videos &bull; ${docCount} Docs</span>
                </div>
                <p class="grower-details">${g.details || 'Registered grower participating in sustainable Vetiver contract farming operations with full technical guidance.'}</p>
              </div>
            </div>
          `);
          container.append(growerCard);
        });
      }
      
      // Wire click handler
      $('.grower-card').on('click', function() {
        $('.grower-card').removeClass('active');
        $(this).addClass('active');
        selectedGrowerId = $(this).attr('data-id');
        
        // Update gallery headings
        updateGalleryHeadings();
        renderMediaShowcase();
        
        // Smooth scroll to showcase
        document.getElementById('mediaShowcase').scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
      
      triggerScrollAnimations();
    }
    
    function updateGalleryHeadings() {
      const titleSpan = $('#gallerySectionTitle span');
      const subtitle = $('#gallerySectionSubtitle');
      
      if (selectedGrowerId === 'all') {
        $('#gallerySectionTitle').html('Cultivation <span>Updates</span>');
        subtitle.text('Browse real-time pictures, educational videos, and analytical documentations linked to our farming processes.');
      } else {
        const grower = growersList.find(g => g.id === selectedGrowerId);
        if (grower) {
          $('#gallerySectionTitle').html(`Farming: <span>${grower.name}</span>`);
          subtitle.html(`Displaying updates for farm plot located in <strong>${grower.location}</strong> (${grower.acres || 'N/A'} Acres).`);
        }
      }
    }
    
    function renderMediaShowcase() {
      const container = $('#mediaShowcaseGrid');
      container.empty();
      
      // Filter media by grower ID and type
      let filtered = mediaList.filter(item => item.type === activeMediaType);
      
      if (selectedGrowerId !== 'all') {
        filtered = filtered.filter(item => item.growerId === selectedGrowerId);
      }
      
      if (filtered.length === 0) {
        let textMsg = `No pictures uploaded for this selection.`;
        if (activeMediaType === 'video') textMsg = `No videos uploaded for this selection.`;
        if (activeMediaType === 'pdf') textMsg = `No documents or PDFs uploaded for this selection.`;
        
        container.append(`
          <div class="col-12">
            <div class="gallery-empty">
              <i class="fas fa-folder-open"></i>
              <h4>No Media Found</h4>
              <p class="small">${textMsg}</p>
            </div>
          </div>
        `);
        return;
      }
      
      // Render based on media type
      filtered.slice().reverse().forEach(item => {
        let colHtml = '';
        
        if (activeMediaType === 'image') {
          colHtml = `
            <div class="col-lg-4 col-md-6 animate-on-scroll">
              <div class="media-card">
                <div class="media-card-img-wrap">
                  <img src="${item.url}" class="media-card-img" alt="${item.title}">
                  <div class="media-card-overlay">
                    <a href="#" class="media-card-view-btn lightbox-trigger" data-img="${item.url}"><i class="fas fa-expand"></i></a>
                  </div>
                </div>
                <div class="media-card-body">
                  <h4 class="media-card-title" title="${item.title}">${item.title}</h4>
                  <p class="media-card-desc">${item.description || 'Farming plot snapshot and crop growth tracking.'}</p>
                </div>
              </div>
            </div>
          `;
        } else if (activeMediaType === 'video') {
          colHtml = `
            <div class="col-lg-4 col-md-6 animate-on-scroll">
              <div class="media-card">
                <div class="media-video-container">
                  <video src="${item.url}" controls poster="img/vetiver_agriculture.jpg"></video>
                </div>
                <div class="media-card-body">
                  <h4 class="media-card-title" title="${item.title}">${item.title}</h4>
                  <p class="media-card-desc">${item.description || 'Cultivation method walk-through and educational guide.'}</p>
                </div>
              </div>
            </div>
          `;
        } else if (activeMediaType === 'pdf') {
          // Calculate arbitrary size for aesthetics
          const mockSize = ((item.id % 200) / 10 + 1.2).toFixed(1) + ' MB';
          colHtml = `
            <div class="col-md-6 animate-on-scroll">
              <div class="doc-card">
                <div class="doc-icon"><i class="fas fa-file-pdf"></i></div>
                <div class="doc-info">
                  <h4 class="doc-title" title="${item.title}">${item.title}</h4>
                  <div class="doc-meta">
                    <span>PDF Document &bull; ${mockSize} &bull; Published ${item.date}</span>
                  </div>
                </div>
                <a href="${item.url}" class="doc-dl-btn" download title="Download Document">
                  <i class="fas fa-download"></i>
                </a>
              </div>
            </div>
          `;
        }
        
        container.append(colHtml);
      });
      
      // Wire Lightbox
      $('.lightbox-trigger').on('click', function(e) {
        e.preventDefault();
        const src = $(this).attr('data-img');
        $('#lightboxImage').attr('src', src);
        const myModal = new bootstrap.Modal(document.getElementById('lightboxModal'));
        myModal.show();
      });
      
      triggerScrollAnimations();
    }
    
    // Tab filtering click handlers
    $('.filter-tab-btn').on('click', function() {
      $('.filter-tab-btn').removeClass('active');
      $(this).addClass('active');
      activeMediaType = $(this).attr('data-type');
      renderMediaShowcase();
    });
    
    function triggerScrollAnimations() {
      const els = document.querySelectorAll('.animate-on-scroll');
      els.forEach(function(el) {
        el.classList.add('visible');
      });
    }
  });

  // ===== NAVBAR SCROLL EFFECT =====
  window.addEventListener('scroll', function() {
    const navbar = document.getElementById('mainNavbar');
    if (window.scrollY > 60) {
      navbar.classList.add('scrolled');
    } else {
      navbar.classList.remove('scrolled');
    }
    // Back to top
    const btt = document.getElementById('back-to-top');
    if (btt) {
      if (window.scrollY > 400) btt.classList.add('show');
      else btt.classList.remove('show');
    }
  });

  // ===== BACK TO TOP =====
  var btt = document.getElementById('back-to-top');
  if (btt) {
    btt.addEventListener('click', function(e) {
      e.preventDefault();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }
</script>

</body>
</html>
